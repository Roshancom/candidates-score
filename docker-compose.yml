version: "3.8"

services:
  backend:
    build: ./backend
    container_name: techkraft-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./techkraft.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: techkraft-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://localhost:8000
      - VITE_API_PROXY_TARGET=http://backend:8000
    command: npm run dev -- --host 0.0.0.0
